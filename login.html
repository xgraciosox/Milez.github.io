<body>
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
    
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
    
        .login-box {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    
        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
        }
    
        .input-box {
            margin-bottom: 20px;
        }
    
        .input-box label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
    
        .input-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
    
        .input-box input:focus {
            border-color: #667eea;
            outline: none;
        }
    
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
    
        .btn:hover {
            background: #5a67d8;
        }
    
        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    
        .register-link a {
            color: #667eea;
            text-decoration: none;
        }
    
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
    </head>
    
    <body>
    
    <div class="login-box">
        <h2>Login</h2>
        <form>
            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
    
            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>
    
            <button type="submit" class="btn">Login</button>
    
            <div class="register-link">
                Don't have an account? <a href="#">Register</a>
            </div>
        </form>
    </div>
    
    </body>
    </html>
</style>
</body>
</html>
